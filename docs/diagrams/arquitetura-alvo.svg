<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 580" width="700" height="580">
  <defs>
    <style>
      text { font-family: Inter, sans-serif; }
      .title { font-size: 13px; font-weight: 700; fill: #e8650a; }
      .label { font-size: 11px; fill: #1a1a1a; }
      .small { font-size: 9px; fill: #6b6b6b; }
      .box-user { fill: #fef3e8; stroke: #e8650a; stroke-width: 2; rx: 8; }
      .box-layer { fill: #ffffff; stroke: #e5e2db; stroke-width: 1.5; rx: 6; }
      .box-comp { fill: #f3f1ed; stroke: #d5d0c8; stroke-width: 1; rx: 4; }
      .box-api { fill: #e8f1fe; stroke: #1a56db; stroke-width: 1.5; rx: 4; }
      .box-db { fill: #e8f5ee; stroke: #0a7c42; stroke-width: 1.5; rx: 4; }
      .box-dist { fill: #fef3e8; stroke: #e8650a; stroke-width: 1; rx: 4; }
      .arrow { stroke: #6b6b6b; stroke-width: 1.5; fill: none; marker-end: url(#arr3); }
      .arrow-dashed { stroke: #6b6b6b; stroke-width: 1; fill: none; stroke-dasharray: 4,3; }
    </style>
    <marker id="arr3" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0,0 8,3 0,6" fill="#6b6b6b"/>
    </marker>
  </defs>

  <!-- User -->
  <rect x="230" y="10" width="240" height="45" class="box-user"/>
  <text x="350" y="32" text-anchor="middle" class="title">USUÁRIO FINAL</text>
  <text x="350" y="46" text-anchor="middle" class="small">microempreendedor, MEI</text>

  <!-- Frontend -->
  <line x1="350" y1="55" x2="350" y2="80" class="arrow"/>
  <rect x="160" y="80" width="380" height="55" class="box-layer"/>
  <text x="350" y="98" text-anchor="middle" class="title">FRONTEND (Estático)</text>
  <rect x="200" y="108" width="300" height="22" class="box-comp"/>
  <text x="350" y="124" text-anchor="middle" class="label">Pulso Fortal Web · GitHub Pages / Vercel</text>

  <!-- API Gateway -->
  <line x1="350" y1="135" x2="350" y2="160" class="arrow"/>
  <rect x="160" y="160" width="380" height="75" class="box-api"/>
  <text x="350" y="178" text-anchor="middle" class="title">API Gateway (FastAPI)</text>
  <text x="350" y="195" text-anchor="middle" class="label">/bairros/{id}   /indicadores   /empresas   /oportunidades</text>
  <text x="350" y="215" text-anchor="middle" class="small">HTTPS + JSON · mesmo contrato de dados do protótipo</text>

  <!-- Database -->
  <line x1="350" y1="235" x2="350" y2="260" class="arrow"/>
  <rect x="160" y="260" width="380" height="65" class="box-db"/>
  <text x="350" y="278" text-anchor="middle" class="title">DADOS</text>
  <rect x="180" y="288" width="160" height="30" class="box-comp"/>
  <text x="260" y="308" text-anchor="middle" class="label">PostgreSQL (N688)</text>
  <rect x="360" y="288" width="160" height="30" class="box-comp"/>
  <text x="440" y="308" text-anchor="middle" class="label">Redis (cache)</text>

  <!-- Pipeline -->
  <line x1="350" y1="325" x2="350" y2="350" class="arrow-dashed"/>
  <rect x="160" y="350" width="380" height="65" class="box-layer"/>
  <text x="350" y="368" text-anchor="middle" class="title">PIPELINE ETL (cronjob mensal)</text>
  <rect x="180" y="378" width="340" height="30" class="box-comp"/>
  <text x="350" y="398" text-anchor="middle" class="label">RAIS + IBGE + CAGED FTP + Brasil API + Fortaleza CKAN</text>

  <!-- Distribution -->
  <rect x="30" y="450" width="290" height="90" class="box-dist"/>
  <text x="175" y="470" text-anchor="middle" class="title">Bot WhatsApp</text>
  <text x="175" y="488" text-anchor="middle" class="small">Twilio / Meta Business API</text>
  <text x="175" y="510" text-anchor="middle" class="small">formato preferido de 85% dos MEIs</text>
  
  <rect x="380" y="450" width="290" height="90" class="box-dist"/>
  <text x="525" y="470" text-anchor="middle" class="title">Newsletter Semanal</text>
  <text x="525" y="488" text-anchor="middle" class="small">HTML gerado via API</text>
  <text x="525" y="510" text-anchor="middle" class="small">Resumo do bairro toda segunda-feira</text>

  <!-- Distribution arrows from API -->
  <line x1="260" y1="235" x2="175" y2="450" class="arrow-dashed"/>
  <line x1="440" y1="235" x2="525" y2="450" class="arrow-dashed"/>
</svg>